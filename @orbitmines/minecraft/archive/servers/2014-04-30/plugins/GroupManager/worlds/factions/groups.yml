# Group inheritance
#
# Any inherited groups prefixed with a g: are global groups
# and are inherited from the GlobalGroups.yml.
#
# Groups without the g: prefix are groups local to this world
# and are defined in the this groups.yml file.
#
# Local group inheritances define your promotion tree when using 'manpromote/mandemote'

groups:
  UserF:
    default: true
    permissions:
    - essentials.msg
    - multiverse.access.*
    - -multiverse.access.SurvivalWorld
    - -multiverse.access.SurvivalWorld_nether
    - -multiverse.access.nether_SurvivalWorld
    - essentials.rules
    - multiverse.portal.access.*
    - mycommand.cmd.1
    - mycommand.cmd.2
    - mycommand.cmd.3
    - serversigns.use.*
    - shop.factions
    - mycommand.cmd.4
    - BossShop.open
    - shop.factions
    - nametag.group.user
    - -easyplant.*
    - essentials.tpdeny
    - essentials.tpaccept
    - essentials.tpa
    - kit.kit
    - essentials.mail
    - essentials.mail.send
    - essentials.mail.clear
    - essentials.mail.read
    - kit.Factions
    - mycommand.cmd.5
    - mycommand.cmd.6
    - mycommand.cmd.7
    - mycommand.cmd.8
    - mycommand.cmd.9
    - mycommand.cmd.10
    - mycommand.cmd.11
    - mycommand.cmd.12
    - mycommand.cmd.15
    - mycommand.cmd.16
    - mycommand.cmd.17
    - mycommand.cmd.18
    - mycommand.cmd.24
    - mycommand.cmd.25
    - mycommand.cmd.26
    - mycommand.cmd.27
    - mycommand.cmd.28
    - mycommand.cmd.29
    - mycommand.cmd.30
    - mycommand.cmd.31
    - mycommand.cmd.75
    - mycommand.cmd.312
    - mycommand.cmd.313
    - mycommand.cmd.311
    info:
      prefix: '&7[&8&lUser&7] &8'
      build: true
