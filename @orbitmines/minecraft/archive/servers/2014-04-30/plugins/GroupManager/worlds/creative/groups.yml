    - -multiverse.access.nether_SurvivalWorld
    - -multiverse.access.Factions
    - -multiverse.access.Factions_nether
    - -multiverse.access.nether_Factions
    - mycommand.cmd.6
    - mycommand.cmd.7
    - mycommand.cmd.8
    - mycommand.cmd.9
    - mycommand.cmd.10
    - mycommand.cmd.11
    - mycommand.cmd.12
    - mycommand.cmd.13
    - mycommand.cmd.14
    - mycommand.cmd.15
    - mycommand.cmd.16
    - mycommand.cmd.17
    - mycommand.cmd.18
    - mycommand.cmd.24
    - mycommand.cmd.25
    - mycommand.cmd.26
    - mycommand.cmd.30
    - mycommand.cmd.31
    - mycommand.cmd.75
    - mycommand.cmd.312
    - mycommand.cmd.313
    - mycommand.cmd.311
