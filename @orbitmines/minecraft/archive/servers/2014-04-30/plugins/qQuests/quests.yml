First Assignment:
  setup:
    repeated: 0
    invisible: false
  tasks:
    '0':
      type: kill
      id: zombie
      display: Zombie
      amount: 6
    '1':
      type: collect
      id: 351;1
      display: Prometium
      amount: 8
  onJoin:
    message: First Assignment Kill - 6 Zombies and Collect 8 Prometium! Reward $10!
  onDrop:
    message: First Assignment - Try it again later!
  onComplete:
    message: First Assignment - Completed!
    delay: 5
    money: 40
