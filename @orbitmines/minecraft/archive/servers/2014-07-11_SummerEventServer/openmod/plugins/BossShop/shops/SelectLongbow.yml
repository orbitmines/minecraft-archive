ShopName: Kit-Longbow
signs:
  text: '[Kit-Longbow]'
  NeedPermissionToCreateSign: true
shop:
  Choose:
    RewardType: command
    PriceType: free
    Reward:
    - 'manuadd %player% Longbow'
    - 'mvtp %player% Event'
    - 'kit Longbow %player%'
    - 'sudo O_o_Fadi_o_O pwrsay say event &f%player%&c has chosen the &fLongbow Kit&c!'
    MenuItem:
    - id:351
    - amount:1
    - durability:10
    - 'name:&bSelect: &aLongbow'
    InventoryLocation: 1
    ExtraPermission: 'shops.waiting'
