version: '3.5' # git pull && git submodule update --recursive --remote
services:
  # NOTE TO SELF: Ports within network do not use the external port, but their internal ones.
  mysql:
    image: mysql:8.0.15
    restart: always
    command: --default-authentication-plugin=mysql_native_password --init-file /app/fixtures_production.sql
    environment:
      MYSQL_ROOT_PASSWORD: 'o8D2!ld191MGEC01'
      MYSQL_DATABASE: orbitmines_production
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3308:3306"
    volumes:
      - ./db:/app
      - /home/orbitmines/current/database/mysql-data:/var/lib/mysql
  redis:
    image: redis:5.0.3-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
#    volumes:
#      - /home/orbitmines/current/database/redis-data:/data
  bungeecord:
    build:
      context: .
      dockerfile: ./Dockerfile.bungeecord.production
      args:
        om_server_name: bungeecord
        bungeecord_version: LATEST
    depends_on:
      - mysql
      - redis
    environment:
      - OM_ENV=production
      - OM_SERVER_NAME=bungeecord
      - OM_IP=bungeecord
      - OM_PORT=25565
      - OM_XMS=2G
      - OM_XMX=2G
      - OM_DISCORD_SERVER_ID=221293899967102976
      - OM_DISCORD_BOT_TOKEN=
      - OM_DISCORD_BOT_MAIN=true
      - OM_DB_HOST=mysql
      - OM_DB_PORT=3306
      - OM_DB_NAME=orbitmines_production
      - OM_DB_USER=orbitmines
      - OM_DB_PASSWORD=o8D2!ld191MGEC01
      - OM_DB_OPTIONS=?useUnicode=true&amp;useJDBCCompliantTimezoneShift=true&amp;serverTimezone=UTC
      - OM_REDIS_HOST=redis
      - OM_REDIS_PORT=6379
      - OM_REDIS_TIMEOUT=0
      - OM_REDIS_MAX_POOL_SIZE=20
#      - OM_MAX_PLAYERS=300
      - OM_WEBSITE_LINK=https://www.OrbitMines.com
      - OM_SHOP_LINK=https://OrbitMines.buycraft.net
    stdin_open: true
    tty: true
    ports:
      - "25565:25565"
      - "8804:8804" # Player Analytics
      - "8192:8192" # Votifier
    command: [sh, -c, "cd /app &&
                             mkdir -p plugins &&
                             cp /build/servers/bungeecord/target/bungeecord-1.0-SNAPSHOT-jar-with-dependencies.jar /app/plugins/bungeecord.jar &&
                             cp /build/bungeecord-jars/LATEST.jar /app/minecraft_server.jar &&
                             cp -a /build/servers/bungeecord/.docker/server_template/. /app &&
                             chmod +x /app/start.sh &&
                             sh start.sh"]
    restart: always
    volumes:
      - .:/build
      - /home/orbitmines/current/servers/bungeecord:/app
      - /home/orbitmines/current/skins:/app/skins # SkinLibrary
  hub:
    build:
      context: .
      dockerfile: ./Dockerfile.spigot.production
      args:
        om_server_name: hub
        space_spigot_version: LATEST
    depends_on:
      - mysql
      - redis
    environment:
      - OM_ENV=production
      - OM_SERVER_NAME=hub
      - OM_IP=hub
      - OM_PORT=25565
      - OM_XMS=4G
      - OM_XMX=4G
      - OM_DISCORD_SERVER_ID=221293899967102976
      - OM_DISCORD_BOT_TOKEN=
      - OM_DISCORD_BOT_MAIN=false
      - OM_DB_HOST=mysql
      - OM_DB_PORT=3306
      - OM_DB_NAME=orbitmines_production
      - OM_DB_USER=orbitmines
      - OM_DB_PASSWORD=o8D2!ld191MGEC01
      - OM_DB_OPTIONS=?useUnicode=true&amp;useJDBCCompliantTimezoneShift=true&amp;serverTimezone=UTC
      - OM_REDIS_HOST=redis
      - OM_REDIS_PORT=6379
      - OM_REDIS_TIMEOUT=0
      - OM_REDIS_MAX_POOL_SIZE=15
      - OM_DISCORD_INVITE_LINK=https://www.OrbitMines.com/discord
      - OM_WEBSITE_LINK=https://www.OrbitMines.com
      - OM_SHOP_LINK=https://OrbitMines.buycraft.net
      - PLAN_URL=http://bungeecord:8804
    stdin_open: true
    tty: true
    ports:
      - "25566:25565"
    command: [sh, -c, "cd /app &&
                             mkdir -p plugins &&
                             cp /build/servers/hub/target/hub-1.0-SNAPSHOT-jar-with-dependencies.jar /app/plugins/hub.jar &&
                             cp /build/space-spigot-jars/LATEST.jar /app/minecraft_server.jar &&
                             cp -a /build/spigot-libraries/.docker/server_template/. /app &&
                             cp -a /build/servers/hub/.docker/server_template/. /app &&
                             chmod +x /app/start.sh &&
                             sh start.sh"]
    restart: always
    volumes:
      - .:/build
      - /home/orbitmines/current/servers/hub:/app
      - /home/orbitmines/current/skins:/app/skins # SkinLibrary
      - ./worlds:/app/worlds # Lobbies & Maps
  survival:
    build:
      context: .
      dockerfile: ./Dockerfile.spigot.production
      args:
        om_server_name: survival
        space_spigot_version: LATEST
    depends_on:
      - mysql
      - redis
    environment:
      - OM_ENV=production
      - OM_SERVER_NAME=survival
      - OM_IP=survival
      - OM_PORT=25565
      - OM_XMS=22G
      - OM_XMX=22G
      - OM_DISCORD_SERVER_ID=221293899967102976
      - OM_DISCORD_BOT_TOKEN=
      - OM_DISCORD_BOT_MAIN=false
      - OM_DB_HOST=mysql
      - OM_DB_PORT=3306
      - OM_DB_NAME=orbitmines_production
      - OM_DB_USER=orbitmines
      - OM_DB_PASSWORD=o8D2!ld191MGEC01
      - OM_DB_OPTIONS=?useUnicode=true&amp;useJDBCCompliantTimezoneShift=true&amp;serverTimezone=UTC
      - OM_REDIS_HOST=redis
      - OM_REDIS_PORT=6379
      - OM_REDIS_TIMEOUT=0
      - OM_REDIS_MAX_POOL_SIZE=15
      - OM_DISCORD_INVITE_LINK=https://www.OrbitMines.com/discord
      - OM_WEBSITE_LINK=https://www.OrbitMines.com
      - OM_SHOP_LINK=https://OrbitMines.buycraft.net
      - PLAN_URL=http://bungeecord:8804
    stdin_open: true
    tty: true
    ports:
      - "25567:25565"
    command: [sh, -c, "cd /app &&
                             mkdir -p plugins &&
                             cp /build/servers/survival/target/survival-1.0-SNAPSHOT-jar-with-dependencies.jar /app/plugins/survival.jar &&
                             cp /build/space-spigot-jars/LATEST.jar /app/minecraft_server.jar &&
                             cp -a /build/spigot-libraries/.docker/server_template/. /app &&
                             cp -a /build/servers/survival/.docker/server_template/. /app &&
                             chmod +x /app/start.sh &&
                             sh start.sh"]
    restart: always
    volumes:
      - .:/build
      - /home/orbitmines/current/servers/survival:/app
      - /home/orbitmines/current/skins:/app/skins # SkinLibrary
      - ./worlds:/app/worlds # Lobbies & Maps
  kitpvp:
    build:
      context: .
      dockerfile: ./Dockerfile.spigot.production
      args:
        om_server_name: kitpvp
        space_spigot_version: LATEST
    depends_on:
      - mysql
      - redis
    environment:
      - OM_ENV=production
      - OM_SERVER_NAME=kitpvp
      - OM_IP=kitpvp
      - OM_PORT=25565
      - OM_XMS=6G
      - OM_XMX=6G
      - OM_DISCORD_SERVER_ID=221293899967102976
      - OM_DISCORD_BOT_TOKEN=
      - OM_DISCORD_BOT_MAIN=false
      - OM_DB_HOST=mysql
      - OM_DB_PORT=3306
      - OM_DB_NAME=orbitmines_production
      - OM_DB_USER=orbitmines
      - OM_DB_PASSWORD=o8D2!ld191MGEC01
      - OM_DB_OPTIONS=?useUnicode=true&amp;useJDBCCompliantTimezoneShift=true&amp;serverTimezone=UTC
      - OM_REDIS_HOST=redis
      - OM_REDIS_PORT=6379
      - OM_REDIS_TIMEOUT=0
      - OM_REDIS_MAX_POOL_SIZE=15
      - OM_DISCORD_INVITE_LINK=https://www.OrbitMines.com/discord
      - OM_WEBSITE_LINK=https://www.OrbitMines.com
      - OM_SHOP_LINK=https://OrbitMines.buycraft.net
      - PLAN_URL=http://bungeecord:8804
    stdin_open: true
    tty: true
    ports:
      - "25568:25565"
    command: [sh, -c, "cd /app &&
                             mkdir -p plugins &&
                             cp /build/servers/kitpvp/target/kitpvp-1.0-SNAPSHOT-jar-with-dependencies.jar /app/plugins/kitpvp.jar &&
                             cp /build/space-spigot-jars/LATEST.jar /app/minecraft_server.jar &&
                             cp -a /build/spigot-libraries/.docker/server_template/. /app &&
                             cp -a /build/servers/kitpvp/.docker/server_template/. /app &&
                             chmod +x /app/start.sh &&
                             sh start.sh"]
    restart: always
    volumes:
      - .:/build
      - /home/orbitmines/current/servers/kitpvp:/app
      - /home/orbitmines/current/skins:/app/skins # SkinLibrary
      - ./worlds:/app/worlds # Lobbies & Maps
