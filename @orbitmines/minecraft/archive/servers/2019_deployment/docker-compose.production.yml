  build:
    build:
      context: .
      dockerfile: ./Dockerfile.spigot.production
      args:
        om_server_name: build
        space_spigot_version: LATEST
    depends_on:
      - mysql
      - redis
    environment:
      - OM_ENV=production
      - OM_SERVER_NAME=build
      - OM_IP=build
      - OM_PORT=25565
      - OM_XMS=5G
      - OM_XMX=5G
      - OM_DISCORD_SERVER_ID=221293899967102976
      - OM_DISCORD_BOT_TOKEN=
      - OM_DISCORD_BOT_MAIN=false
      - OM_DB_HOST=mysql
      - OM_DB_PORT=3306
      - OM_DB_NAME=orbitmines_production
      - OM_DB_USER=orbitmines
      - OM_DB_PASSWORD=o8D2!ld191MGEC01
      - OM_DB_OPTIONS=?useUnicode=true&amp;useJDBCCompliantTimezoneShift=true&amp;serverTimezone=UTC
      - OM_REDIS_HOST=redis
      - OM_REDIS_PORT=6379
      - OM_REDIS_TIMEOUT=0
      - OM_REDIS_MAX_POOL_SIZE=15
      - OM_DISCORD_INVITE_LINK=https://www.OrbitMines.com/discord
      - OM_WEBSITE_LINK=https://www.OrbitMines.com
      - OM_SHOP_LINK=https://OrbitMines.buycraft.net
      - PLAN_URL=http://bungeecord:8804
    stdin_open: true
    tty: true
    ports:
      - "25570:25565"
    command: [sh, -c, "cd /app &&
                            mkdir -p plugins &&
                            cp /build/servers/build/target/build-1.0-SNAPSHOT-jar-with-dependencies.jar /app/plugins/build.jar &&
                            cp /build/space-spigot-jars/LATEST.jar /app/minecraft_server.jar &&
                            cp -a /build/spigot-libraries/.docker/server_template/. /app &&
                            cp -a /build/servers/build/.docker/server_template/. /app &&
                            chmod +x /app/start.sh &&
                            sh start.sh"]
    restart: always
    volumes:
      - .:/build
      - /home/orbitmines/current/servers/build:/app
      - /home/orbitmines/current/skins:/app/skins # SkinLibrary
      - ./worlds:/app/worlds # Lobbies & Maps
  error-tracker:
    build:
      context: .
      dockerfile: ./Dockerfile.error_tracker.production
    depends_on:
      #      - mysql
      - redis
    environment:
      - OM_ENV=production
      - OM_DISCORD_SERVER_ID=221293899967102976
      - OM_DISCORD_BOT_TOKEN=
      - OM_DISCORD_BOT_MAIN=false
      #      - OM_DB_HOST=mysql
      #      - OM_DB_PORT=3306
      #      - OM_DB_NAME=orbitmines_production
      #      - OM_DB_USER=orbitmines
      #      - OM_DB_PASSWORD=o8D2!ld191MGEC01
      #      - OM_DB_OPTIONS=?useUnicode=true&amp;useJDBCCompliantTimezoneShift=true&amp;serverTimezone=UTC
      - OM_REDIS_HOST=redis
      - OM_REDIS_PORT=6379
      - OM_REDIS_TIMEOUT=0
      - OM_REDIS_MAX_POOL_SIZE=5
    stdin_open: true
    tty: true
    command: [sh, -c, "cd /app &&
                             cp /build/error-tracker/target/ErrorTracker-1.0-SNAPSHOT-jar-with-dependencies.jar /app/error-tracker.jar &&
                             java -jar error-tracker.jar"]
    restart: always
    volumes:
      - .:/build
      - /home/orbitmines/current/servers/hub/logs:/app/servers/hub
      - /home/orbitmines/current/servers/survival/logs:/app/servers/survival
      - /home/orbitmines/current/servers/kitpvp/logs:/app/servers/kitpvp
      - /home/orbitmines/current/servers/prison/logs:/app/servers/prison
      - /home/orbitmines/current/servers/build/logs:/app/servers/build
      - /home/orbitmines/current/servers/bungeecord:/app/servers/bungeecord
      - /home/orbitmines/current/error_logs:/app/error_logs
  server-restarter:
    build:
      context: .
      dockerfile: ./Dockerfile.server_restarter.production
    depends_on:
      - redis
    environment:
      - OM_ENV=production
      - OM_REDIS_HOST=redis
      - OM_REDIS_PORT=6379
      - OM_REDIS_TIMEOUT=0
      - OM_REDIS_MAX_POOL_SIZE=5
      - OM_HUB_TIMEOUT=40
      - OM_SURVIVAL_TIMEOUT=60
      - OM_HOST_IP=144.76.112.55
      - OM_HOST_RESTARTER_USER=server-restarter
    stdin_open: true
    tty: true
    command: [sh, -c, "cd /app &&
                             cp /build/server-restarter/target/ServerRestarter-1.0-SNAPSHOT-jar-with-dependencies.jar /app/server-restarter.jar &&
                             java -jar server-restarter.jar"]
    restart: always
    volumes:
      - .:/build
      - /home/orbitmines/current/server-restarter/.ssh:/root/.ssh
  website:
    build:
      context: .
      dockerfile: ./Dockerfile.website.production
    depends_on:
      - mysql
      - nginx
    #      - redis
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - OM_ENV=production
      - OM_DB_HOST=mysql
      - OM_DB_PORT=3306
      - OM_DB_NAME=orbitmines_production
      - OM_DB_USER=orbitmines
      - OM_DB_PASSWORD=o8D2!ld191MGEC01
      #      - OM_DB_OPTIONS=?useUnicode=true&amp;useJDBCCompliantTimezoneShift=true&amp;serverTimezone=UTC
      - OM_REDIS_HOST=redis
      - OM_REDIS_PORT=6379
    command: [sh, -c, "cd /app && rm -rf tmp/pids/server.pid && rails server -b 0.0.0.0"]
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./website:/app
  nginx:
    build:
      context: .
      dockerfile: ./Dockerfile.nginx.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/orbitmines/current/nginx/certs:/etc/nginx/certs