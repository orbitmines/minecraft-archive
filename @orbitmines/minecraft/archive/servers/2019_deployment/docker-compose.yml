      - OM_REDIS_HOST=redis
      - OM_REDIS_PORT=6379
      - OM_REDIS_TIMEOUT=0
      - OM_REDIS_MAX_POOL_SIZE=5
      - DEV_DISCORD_USER=${DEV_DISCORD_USER}
