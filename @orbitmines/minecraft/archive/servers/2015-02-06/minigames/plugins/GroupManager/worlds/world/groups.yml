# Group inheritance
#
# Any inherited groups prefixed with a g: are global groups
# and are inherited from the GlobalGroups.yml.
#
# Groups without the g: prefix are groups local to this world
# and are defined in the this groups.yml file.
#
# Local group inheritances define your promotion tree when using 'manpromote/mandemote'

groups:
  User:
    default: true
    permissions:
    - BossShop.open
    - mycommand.cmd.1
    - mycommand.cmd.2
    - mycommand.cmd.3
    - serversigns.use.*
    - mycommand.cmd.4
    - essentials.spawn
    - mycommand.cmd.5
    - mycommand.cmd.6
    - mycommand.cmd.7
    - mycommand.cmd.8
    - multiverse.portals.access.*
    - -bukkit.command.me
    - -bukkit.command.pl
    - -bukkit.command.plugins
    - -bukkit.command.plugin
    - -bukkit.command.help
    - -bukkit.command.?
    - multiverse.portal.access.*
    - mycommand.cmd.9
    - mycommand.cmd.10
    - PlayerPoints.me
    - mycommand.cmd.11
    - bungeesuite.user
    - bungeesuite.portals.portal.*
    - essentials.mail
    - essentials.mail.read
    - essentials.mail.send
    - essentials.mail.clear
    info:
      prefix: '&8'
      build: false
      suffix: ''