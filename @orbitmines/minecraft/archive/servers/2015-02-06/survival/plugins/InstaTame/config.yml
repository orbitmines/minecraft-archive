wild-tame:
  enabled: true
  notify:
    # Should we notify player once he tames a wild horse
    enabled: true
    # Message that will be sent to player that tames a wild horse
    message: '&6[&7InstaTame&6] &2That horse is now yours!'

egg-tame:
