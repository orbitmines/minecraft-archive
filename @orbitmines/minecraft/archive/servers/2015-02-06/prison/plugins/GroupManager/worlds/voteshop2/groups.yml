# Group inheritance
#
# Any inherited groups prefixed with a g: are global groups
# and are inherited from the GlobalGroups.yml.
#
# Groups without the g: prefix are groups local to this world
# and are defined in the this groups.yml file.
#
# Local group inheritances define your promotion tree when using 'manpromote/mandemote'

groups:
  User:
    default: true
    permissions:
    - BossShop.open.command
    - essentials.spawn
    - voteshop.2
    - mycommand.cmd.1
    - mycommand.cmd.2
    - mycommand.cmd.3
    - mycommand.cmd.4
    - mycommand.cmd.5
    - mycommand.cmd.6
    - mycommand.cmd.7
    - mycommand.cmd.8
    - mycommand.cmd.9
    - mycommand.cmd.10
    - PlayerPoints.me
    - multiverse.access.*
    info:
      prefix: '&7[&8&lUser&7] &8'
      build: true
      suffix: '&0&l [&b&lVoteShop&0&l]'
