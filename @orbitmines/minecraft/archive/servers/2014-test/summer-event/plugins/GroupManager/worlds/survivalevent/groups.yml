# Group inheritance
#
# Any inherited groups prefixed with a g: are global groups
# and are inherited from the GlobalGroups.yml.
#
# Groups without the g: prefix are groups local to this world
# and are defined in the this groups.yml file.
#
# Local group inheritances define your promotion tree when using 'manpromote/mandemote'

groups:
  Checkpoint0:
    default: true
    permissions:
    - mycommand.cmd.1
    - mycommand.cmd.2
    - mycommand.cmd.3
    - mycommand.cmd.4
    - mycommand.cmd.5
    - mycommand.cmd.6
    - mycommand.cmd.7
    - mycommand.cmd.8
    - mycommand.cmd.9
    - mycommand.cmd.10
    - mycommand.cmd.11
    - mycommand.cmd.12
    - mycommand.cmd.13
    - mycommand.cmd.14
    - mycommand.cmd.15
    - Event.CheckPoint1
    - nametag.group.checkpoint0
    - essentials.spawn
    - serversigns.use.*
    info:
      prefix: '&7[&6&lX&7-&4&lRun&7] &7'
      build: false
      suffix: ' &7[&a0&7]'
