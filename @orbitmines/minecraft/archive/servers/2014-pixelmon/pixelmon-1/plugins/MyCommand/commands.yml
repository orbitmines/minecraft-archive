  - '&9Donate to get VIP and some cool Stuff!'
  - '&9Donate at: &6http://shop.orbitmines.com'
  - '&6-----------------------------------------------------'
  runcmd:
  - '/pwrsay say Donate &6$player&9 used &6/donate&9 to see the Donate Site!'
