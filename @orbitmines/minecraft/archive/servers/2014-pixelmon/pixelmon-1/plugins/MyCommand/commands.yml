  type: text
  text:
  - '&9&m====================================================='
  - '&6&l OrbitMines &4&lPixel&f&lmon &6&lHelp Index:'
  - '&6 /shop &7- Open the Shop'
  - '&6 /spawn &7- Teleport to Spawn'
  - '&6 /warplist &7- List of Warps'
  - '&6 /teleport &7- Open the Teleport Menu'
  - '&6 /vote &7- Show Vote Information'
  - '&6 /donate &7- Show Donate Information'
  - '&9&m====================================================='
'6':
